services:
  - type: web
    name: hamatzpen
    env: python
    region: frankfurt
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      PLAYWRIGHT_BROWSERS_PATH=0 playwright install chromium
      PLAYWRIGHT_BROWSERS_PATH=0 playwright install-deps chromium
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --worker-class gthread
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: NADLAN_ADMIN_PASSWORD
        sync: false
      - key: OUTPUT_DIR
        value: /app/output
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
    disk:
      name: data
      mountPath: /app/output
      sizeGB: 1
