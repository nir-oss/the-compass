services:
  - type: web
    name: hamatzpen
    env: docker
    region: frankfurt
    plan: starter
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: NADLAN_ADMIN_PASSWORD
        sync: false
      - key: OUTPUT_DIR
        value: /app/output
    disk:
      name: data
      mountPath: /app/output
      sizeGB: 1
