{% extends "base.html" %}
{% block title %}דוח — Nadlan AI{% endblock %}
{% block content %}
<div class="report-layout">
  <div class="report-nav">
    <a href="/" class="back-link">← חזרה לצ׳אט</a>
    <span class="report-title">
      {{ report.settlement or '' }}{% if report.street and report.settlement %} — {% endif %}{{ report.street or '' }}
    </span>
  </div>
  <iframe src="{{ url_for('report_file', report_id=report_id) }}" class="report-frame" title="דוח נדל״ן" sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
</div>
{% endblock %}
